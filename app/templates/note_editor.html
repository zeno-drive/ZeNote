{% extends "layout.html" %}
{% block body %}
<h1>{{ note.name }}</h1>

<form action="/note_editor/{{ note._id }}" method="post">
    <textarea name="content" class="w-100 p-2" rows="20">{{ note.content or '' }}</textarea>
    <button type="submit" class="btn btn-success mt-2">Save</button>
</form>

{% endblock %}
