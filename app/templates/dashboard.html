{% extends "layout.html" %}
{% block body %}
<h1>Welcome back, {{ current_user.name }}</h1>

<div class="explorer-box">
    <div class="d-flex flex-wrap gap-3">
        {% if user_folders %}
            {% for folder in user_folders %}
                <div class="item-card">
                    <a href="/folder_hub/{{ folder._id }}" style="text-decoration: none;">
                        <div class="item-icon">📁</div>
                        <p>{{ folder.name }}</p>
                    </a>
                    <form action="/delete_folder" method="post">
                        <input type="hidden" name="folder_id" value="{{ folder._id }}">
                        <button type="submit" class="delete-btn">🗑️</button>
                    </form>
                </div>
            {% endfor %}
        {% else %}
            <p class="explorer-empty">No folders yet. Create one to get started.</p>
        {% endif %}
    </div>
</div>

<div class="explorer-toolbar">
    <form action="/dashboard" method="post" class="mb-3">
        <input name="name" placeholder="Folder name" type="text">
        <button type="submit">+ New Folder</button>
    </form>
    {% if e %}
        <span style="color: red;">{{ e }}</span>
    {% endif %}
</div>

{% endblock %}
