<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeNote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg" style="background-color: #28a745;">
        <div class="container">
            <a class="navbar-brand" href="/" style="color: white;">ZeN💡te</a>
            <div class="navbar-nav ms-auto d-flex align-items-center">
                <button id="theme-toggle" class="btn border-0 me-3" style="font-size: 1.3rem;">
                    <span id="theme-icon">🌙</span>
                </button>
                {% if current_user.is_authenticated %}
                    <span class="nav-link me-3"><strong>{{ current_user.name }}</strong></span>
                    <a class="nav-link btn btn-outline-danger rounded-pill px-3" href="/logout" style="color: white;">Logout</a>
                {% else %}
                    <a class="nav-link" href="/login" style="color: white;">Login</a>
                    <a class="nav-link btn btn-outline-primary rounded-pill px-3 ms-2" href="/register" style="color: white;">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        <div class="container py-4">
            {% block body %}{% endblock %}
        </div>
    </main>

   <footer class="footer py-4" style="background-color: #28a745;">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-9">
                <p class="mb-0"style="color: white;">"{{ quote.quote }}" — <em>{{ quote.author }}</em></p>
            </div>
            <div class="col-3 text-end">
                <small style="color: white;">&copy;ZeNote 2026</small>
            </div>
        </div>
    </div>
</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeIcon.innerText = currentTheme === 'dark' ? '☀️' : '🌙';
        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                themeIcon.innerText = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.innerText = '☀️';
            }
        });
    </script>
</body>
</html>
