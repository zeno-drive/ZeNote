<!DOCTYPE html>
<html>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeNote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg nav">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="brand-text">ZeNote</span>
            </a>

            <div class="navbar-nav ms-auto d-flex align-items-center">
                <button id="theme-toggle" class="btn border-0 outline-none me-3" style="font-size: 1.3rem; cursor: pointer;">
                    <span id="theme-icon">🌙</span>
                </button>

                {% if not session.get("name") %}
                    <a class="nav-link" href="/login">Login</a>
                    <a class="nav-link btn btn-outline-primary rounded-pill px-3 ms-2" href="/register">Register</a>
                {% else %}
                    <span class="nav-link me-3 theme-text">Patient: <strong>{{ session["name"] }}</strong></span>
                    <a class="nav-link btn btn-outline-danger rounded-pill px-3" href="/logout">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        <div class="container py-4">
            {% block body %}{% endblock %}
        </div>
    </main>

    <footer class="footer py-4 footer">
        <div class="container text-center">
            <div class="row align-items-center">
                <div class="col-md-4 text-md-start">
                    <p class="mb-0">On a scale of 1 to 10, how would you rate your pain?</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <small>&copy;ZeNote 2026</small>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // 1. Initial Check
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeIcon.innerText = currentTheme === 'dark' ? '☀️' : '🌙';

        // 2. Toggle Event
        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                themeIcon.innerText = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.innerText = '☀️';
            }
        });
    </script>
</body>
</html>
